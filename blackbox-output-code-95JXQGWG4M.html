<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دين عبد الرحمان | موقعي الشخصي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            min-height: 100vh;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(45deg, #e94560, #0f3460);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin-bottom: 20px;
            border: 4px solid #e94560;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.3em;
            color: #a0a0a0;
            margin-bottom: 30px;
        }
        .university {
            background: rgba(233, 69, 96, 0.2);
            padding: 15px 30px;
            border-radius: 30px;
            margin-bottom: 40px;
            border: 1px solid #e94560;
        }
        .university span {
            color: #e94560;
            font-weight: bold;
        }
        .contact-info {
            margin-top: 20px;
        }
        .contact-info a {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        .email-btn {
            background: #e94560;
            color: white;
        }
        .email-btn:hover {
            background: #ff6b6b;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.4);
        }
        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }
        .skill {
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="profile-img">👨‍🎓</div>
        
        <h1>دين عبد الرحمان</h1>
        
        <p class="subtitle">طالب هندسة كهربائية | السنة الثانية</p>
        
        <div class="university">
            🏛️ <span>جامعة هواري بومدين
